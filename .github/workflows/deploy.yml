name: Deploy

env:
  CLOUDFLARE_PROJECT_NAME: tjhub
  CLOUDFLARE_CUSTOM_DOMAIN: tjhub.cc

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@latest pages project create "$CLOUDFLARE_PROJECT_NAME" --production-branch=main || true

      - name: Deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@latest pages deploy dist --project-name="$CLOUDFLARE_PROJECT_NAME" --branch=main

      - name: Bind custom domain
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          api_root="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PROJECT_NAME}/domains"
          headers=(
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
            -H "Content-Type: application/json"
          )

          status_code="$(curl -sS -o domain.json -w "%{http_code}" "${headers[@]}" "${api_root}/${CLOUDFLARE_CUSTOM_DOMAIN}")"

          if [ "$status_code" = "200" ]; then
            echo "Custom domain ${CLOUDFLARE_CUSTOM_DOMAIN} is already bound."
            cat domain.json
            exit 0
          fi

          if [ "$status_code" != "404" ]; then
            echo "Failed to inspect custom domain. HTTP ${status_code}"
            cat domain.json
            exit 1
          fi

          curl -sS --fail-with-body -X POST "${headers[@]}" \
            --data "{\"name\":\"${CLOUDFLARE_CUSTOM_DOMAIN}\"}" \
            "$api_root"
